<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <style>
            p {
                width: fit-content;
            }
            div {
                display: flex;
                flex-direction: row;
                gap: 20px;
                width: fit-content;
            }
            button {
                width: 50px;
                height: 50px;
                padding:10px;
                border-radius: 10px;
                margin-left: 60px;
            }
            .middle {
                margin-left: -50px;
            }
            #Left {
                margin-left: 10px;
            }
            .round {
                background-color: #000000;
                width:50px;
                border-radius: 50px;
                margin-left: -20px;
                margin-right: -30px;
            }
            canvas {
                width: 70%;
            }

        </style>
        
        <div class="">
            <p id="fps">FPS : </p>
            <p id="Sizet">Size :</p>
        </div>
        <div class="">
            
            <p id="Xt">X : </p>
            <p id="Yt">Y : </p>
        </div>
        <canvas id="GameSpace" width="1500px" height="500px" style="border:1px solid #000000; background-color: white; border-radius: 50px; box-shadow: 0 0 20px black;" >
        </canvas>
        <br>
        <br>
        <button id="UP" >UP</button>
        <div class="middle">
        <button id="Right" >Right</button>
        <div class="round"></div>
        <button id="Left" >Left</button>
        </div>
        <button id="Down" >Down</button>
        
        <script src="index.js"></script>
    </body>
    </html>
