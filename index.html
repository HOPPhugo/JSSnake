<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                overscroll-behavior: none;
                -webkit-text-size-adjust: 100%;
                margin-left: 10%;
            }

            body {
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
            }

            p {
                width: fit-content;
            }
            div {
                display: flex;
                flex-direction: row;
                gap: 20px;
                width: fit-content;
            }
            button {
                width: 50px;
                height: 50px;
                padding:10px;
                border-radius: 10px;
                margin-left: 60px;
                touch-action: none;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }
            .middle {
                margin-left: -50px;
            }
            #Right {
                margin-left: 10px;
            }
            .round {
                background-color: #000000;
                width:50px;
                border-radius: 50px;
                margin-left: -20px;
                margin-right: -30px;
            }
            button:active {
                background-color: white;
            }
            canvas {
                width: 70%;
            }
            @media (max-height:771px) {
                body, html {
                    margin-top: 50px;
                }
                .text1, .text2 {
                    position: absolute;
                    margin-left: 990px;
                }
                .text1 {
                    top: 500px;
                }
                .text2 {
                    top: 600px;
                }
            }

        </style>
        
        <div class="text1">
            <p id="fps">FPS : </p>
            <p id="Sizet">Size :</p>
        </div>
        <div class="text2">
            
            <p id="Xt">X : </p>
            <p id="Yt">Y : </p>
        </div>
        <canvas id="GameSpace" width="1500px" height="500px" style="border:1px solid #000000; background-color: white; border-radius: 50px; box-shadow: 0 0 20px black;" >
        </canvas>
        <br>
        <br>
        <button id="Up" >UP</button>
        <div class="middle">
            <button id="Left" >Left</button>
            <div class="round"></div>
            <button id="Right" >Right</button>
        </div>
        <button id="Down" >Down</button>
        
        <script src="index.js"></script>
        <script>
            document.addEventListener('wheel', function (event) {
                if (event.ctrlKey) {
                    event.preventDefault();
                }
            }, { passive: false });

            document.addEventListener('keydown', function (event) {
                if ((event.ctrlKey || event.metaKey) && (event.key === '+' || event.key === '-' || event.key === '0')) {
                    event.preventDefault();
                }
            });

            document.addEventListener('touchmove', function (event) {
                if (event.touches.length > 1) {
                    event.preventDefault();
                }
            }, { passive: false });

            document.addEventListener('dblclick', function (event) {
                event.preventDefault();
            });
        </script>
    </body>
    </html>
